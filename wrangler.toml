name = "ez-trader"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

# No borrar las vars/secrets ya configurados en el worker al hacer deploy
keep_vars = true

# Variables PÚBLICAS (diseñadas para exponerse al cliente — sin riesgo en el repo).
# Los secrets reales NO van acá: se suben con `wrangler secret put/bulk`.
[vars]
NEXT_PUBLIC_SUPABASE_URL = "https://trjkxoixghsaivijnyiw.supabase.co"
NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_QIPc86P_T_--IAMnktaGUQ_0CjcilOm"
# Modelos de IA por rol (no son secretos — solo nombres de modelo).
AGENTE_MODEL = "claude-sonnet-4-6"
AGENTE_MODEL_PROFUNDO = "claude-opus-4-8"
CLASIFICACION_MODEL = "claude-haiku-4-5-20251001"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
